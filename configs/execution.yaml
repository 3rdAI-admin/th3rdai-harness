# Execution config for the optional `orchestrate route --execute` mode (Phase 04).
#
# Default: UAT stub (stdlib, no API keys). Proves CliAdapter + driver plumbing.
# Replace cli.command with your agent CLI when you want real model execution.
#
# Real agent example (requires login / credentials visible to the subprocess;
# CliAdapter only passes PATH, HOME, LANG — see adapter.py):
#   command:
#     - claude
#     - -p
# The assembled context bundle is passed to that command on stdin.
execution:
  default_adapter: noop      # noop (dry-run; default) | cli
  cli:
    command:
      - python3
      - scripts/orchestrator/uat_cli_stub.py
    timeout_seconds: 120

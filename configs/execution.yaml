# Execution config for the optional `orchestrate route --execute` mode (Phase 04).
#
# Default adapter remains noop (dry-run). When using --adapter cli, the command
# below runs with a scrubbed env (PATH, HOME, LANG, USER) plus env_allowlist.
#
# UAT stub (no network): python3 scripts/orchestrator/uat_cli_stub.py
# The assembled context bundle is passed to cli.command on stdin.
execution:
  default_adapter: noop      # noop (dry-run; default) | cli
  cli:
    command:
      - claude
      - -p
    env_allowlist:
      - ANTHROPIC_API_KEY
      - CURSOR_API_KEY
    timeout_seconds: 300
